<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 3 - DOM Manipulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 id="main-heading">Welcome to JavaScript Lab</h1>

  <label for="heading-input">Enter new heading text:</label>
  <input type="text" id="heading-input" placeholder="Type here...">

  <div class="buttons">
    <button id="btn-change-heading">Change Heading</button>
    <button id="btn-change-bg">Change Background</button>
    <button id="btn-font-size">Increase Font Size</button>
    <button id="btn-toggle-para">Show/Hide Paragraph</button>
    <button id="btn-reset">Reset</button>
  </div>

  <p id="sample-para">
    This is a sample paragraph. JavaScript events can dynamically change content.
  </p>

  <script src="script.js"></script>
</body>
</html>
